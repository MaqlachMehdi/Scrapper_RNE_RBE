[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "company-docs-downloader"
version = "0.1.0"
description = "CLI modulaire pour telecharger des documents d'entreprise depuis Pappers et Infogreffe."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "playwright>=1.52.0",
    "questionary>=2.1.0",
]

[project.scripts]
company-docs-downloader = "company_docs_downloader.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
